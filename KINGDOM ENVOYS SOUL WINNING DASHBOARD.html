<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kingdom Envoys Ministries — Soul Winning Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.1.0/iconfont/tabler-icons.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --ink:#241313;
    --paper:#f7f1ea;
    --paper-2:#ffffff;
    --line:#e0d3c4;
    --gold:#c79a3b;
    --gold-deep:#9c7322;
    --maroon:#7a1f2b;
    --maroon-deep:#591118;
    --maroon-soft:#f4e3e2;
    --muted:#8a7a72;
    --radius:14px;
    --serif: Georgia, "Times New Roman", serif;
    --sans: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1000px;margin:0 auto;padding:28px 20px 60px;}

  header.top{
    display:flex;align-items:center;justify-content:space-between;
    padding-bottom:18px;border-bottom:1px solid var(--line);margin-bottom:24px;
    flex-wrap:wrap;gap:12px;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .mark{
    width:42px;height:42px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .brand .mark img{
    width:100%;height:100%;object-fit:contain;
  }
  .brand h1{font-family:var(--serif);font-size:20px;margin:0;font-weight:normal;letter-spacing:.3px;}
  .brand p{margin:2px 0 0;font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
  .session{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);flex-wrap:wrap;}
  .session strong{color:var(--ink);}
  .btn{
    border:1px solid var(--line);background:var(--paper-2);
    padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;
    color:var(--ink);transition:all .15s;display:inline-flex;align-items:center;gap:6px;
  }
  .btn:hover{border-color:var(--maroon);color:var(--maroon-deep);}
  .btn.primary{background:var(--maroon-deep);color:#fff;border-color:var(--maroon-deep);}
  .btn.primary:hover{background:var(--maroon);}
  .btn.full{width:100%;justify-content:center;}

  .login-screen{
    min-height:70vh;display:flex;align-items:center;justify-content:center;
    padding:40px 16px;
  }
  .login-card{
    background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);
    padding:36px 32px;max-width:380px;width:100%;text-align:center;
  }
  .login-card .mark{
    width:80px;height:80px;margin:0 auto 14px;
    display:flex;align-items:center;justify-content:center;
  }
  .login-card .mark img{
    width:100%;height:100%;object-fit:contain;
  }
  .login-card h2{font-family:var(--serif);font-size:22px;margin:0 0 4px;}
  .login-card .verse{font-size:12px;color:var(--muted);margin:0 0 24px;font-style:italic;}
  .field{text-align:left;margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;}
  select, input{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
    font-size:14px;background:var(--paper-2);color:var(--ink);font-family:var(--sans);
  }
  select:focus, input:focus{outline:2px solid var(--maroon);outline-offset:0;border-color:var(--maroon);}
  .login-error{color:#a33;font-size:13px;margin-top:10px;min-height:18px;}
  .hint{font-size:11px;color:var(--muted);margin-top:18px;}

  .hero{
    background:var(--maroon-deep);color:#fbf2ea;border-radius:var(--radius);
    padding:28px 28px;margin-bottom:24px;
  }
  .hero .eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.14em;color:var(--gold);margin:0 0 8px;}
  .hero .total-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
  .hero .total{font-family:var(--serif);font-size:44px;line-height:1;}
  .hero .target{font-size:15px;color:#e7cfcd;}
  .progress-track{
    margin-top:18px;height:10px;border-radius:6px;background:rgba(255,255,255,.15);overflow:hidden;
  }
  .progress-fill{height:100%;background:var(--gold);border-radius:6px;transition:width .4s ease;}
  .hero .meta{display:flex;justify-content:space-between;margin-top:10px;font-size:12px;color:#e7cfcd;flex-wrap:wrap;gap:6px;}

  .grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(180px,1fr));gap:14px;margin-bottom:24px;}
  .card{
    background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 18px;
  }
  .card .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:0 0 6px;}
  .card .value{font-family:var(--serif);font-size:26px;margin:0;}
  .card .sub{font-size:12px;color:var(--muted);margin-top:4px;}

  section{margin-bottom:28px;}
  h2.section-title{
    font-family:var(--serif);font-size:18px;margin:0 0 14px;
    display:flex;align-items:center;gap:8px;font-weight:normal;
    border-bottom:1px solid var(--line);padding-bottom:8px;
    justify-content:space-between;flex-wrap:wrap;gap:10px;
  }
  h2.section-title .title-left{display:flex;align-items:center;gap:8px;}
  h2.section-title i{color:var(--gold-deep);font-size:18px;}

  .entry-card{
    background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 20px;
  }
  .entry-form{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;}
  .entry-form .field{flex:1;min-width:140px;margin-bottom:0;}
  .entry-form .btn{height:42px;padding:0 22px;}
  .form-msg{font-size:13px;margin-top:10px;color:var(--maroon-deep);}

  table{width:100%;border-collapse:collapse;font-size:14px;}
  thead th{
    text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;
    color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--line);font-weight:normal;
  }
  tbody td{padding:9px 10px;border-bottom:1px solid var(--line);}
  tbody tr:last-child td{border-bottom:none;}
  td.actions{text-align:right;}
  .branch-pill{
    font-size:11px;padding:2px 8px;border-radius:20px;
    background:var(--maroon-soft);color:var(--maroon-deep);white-space:nowrap;
  }
  .icon-btn{
    border:none;background:none;color:var(--muted);cursor:pointer;font-size:15px;
    padding:4px;
  }
  .icon-btn:hover{color:#a33;}
  .empty-row{text-align:center;color:var(--muted);padding:24px;font-style:italic;font-size:13px;}

  .totals-table th, .totals-table td{text-align:right;}
  .totals-table th:first-child, .totals-table td:first-child{text-align:left;}

  .table-scroll{overflow-x:auto;}

  .sr-only{
    position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
    clip:rect(0,0,0,0);white-space:nowrap;border:0;
  }

  footer.note{
    text-align:center;font-size:12px;color:var(--muted);padding-top:10px;
  }

  @media (max-width:600px){
    .hero .total{font-size:32px;}
    .entry-form{flex-direction:column;align-items:stretch;}
    .entry-form .btn{width:100%;}
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <h2 class="sr-only">Kingdom Envoys Ministries soul winning tracker, recording names, mobile numbers and events for souls won, with combined progress toward 100 million souls by 2035</h2>
</div>

<script>
const BRANCHES = {
  hq:        { name: "Kingdom Envoys Ministries HQ",       password: "HQ2035!",       short: "HQ" },
  kasarani:  { name: "Kingdom Envoys Ministries Kasarani", password: "Kasarani2035!", short: "Kasarani" },
  kakamega:  { name: "Kingdom Envoys Ministries Kakamega", password: "Kakamega2035!", short: "Kakamega" }
};

const TARGET = 100000000;
const TARGET_YEAR = 2035;
const COMMENCEMENT_DATE = "2026-06-14";
const STORAGE_KEY = "souls_records";

let session = null;
let records = [];

const app = document.getElementById("app");

function fmt(n){ return Math.round(n).toLocaleString("en-US"); }

function fmtDate(d){
  return new Date(d).toLocaleDateString("en-GB", { day:"2-digit", month:"short", year:"numeric" });
}

async function loadRecords(){
  try {
    const res = await window.storage.get(STORAGE_KEY, true);
    if (res && res.value) {
      records = JSON.parse(res.value);
    } else {
      records = [];
    }
  } catch(e){
    records = [];
  }
}

async function saveRecords(){
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(records), true);
  } catch(e){
    console.error("Storage error", e);
  }
}

function totalSouls(){
  return records.length;
}

function branchTotal(key){
  return records.filter(r=>r.branch===key).length;
}

function daysSinceCommencement(){
  const start = new Date(COMMENCEMENT_DATE);
  const now = new Date();
  return Math.max(1, Math.round((now - start)/86400000));
}

function weeklyAverage(){
  const total = totalSouls();
  const weeks = Math.max(1, daysSinceCommencement()/7);
  return total/weeks;
}

function projection(){
  const total = totalSouls();
  const rate = weeklyAverage();
  if (rate <= 0) return null;
  const remaining = TARGET - total;
  const weeksToGo = remaining/rate;
  const targetDate = new Date();
  targetDate.setDate(targetDate.getDate() + weeksToGo*7);
  const weeksAvailable = (new Date(TARGET_YEAR,11,31) - new Date())/(7*86400000);
  return { rate, targetDate, onTrack: weeksToGo <= weeksAvailable };
}

/* ---------- DASHBOARD ---------- */
async function renderDashboard(){
  app.innerHTML = `<div style="text-align:center;padding:60px 0;color:var(--muted);">Loading dashboard…</div>`;
  await loadRecords();

  const total = totalSouls();
  const pct = Math.min(100, (total/TARGET)*100);
  const proj = projection();
  const today = new Date().toISOString().slice(0,10);

  const branchRows = Object.keys(BRANCHES).map(key=>{
    const t = branchTotal(key);
    const pctOfTotal = total > 0 ? (t/total*100) : 0;
    return `<tr>
      <td>${BRANCHES[key].name}</td>
      <td>${fmt(t)}</td>
      <td>${pctOfTotal.toFixed(1)}%</td>
    </tr>`;
  }).join("");

  const sortedRecords = [...records].sort((a,b)=> new Date(b.date) - new Date(a.date) || (b.id > a.id ? 1 : -1));
  const tableRows = sortedRecords.length ? sortedRecords.map(r=>{
    const canEdit = r.branch === session.key;
    return `<tr>
      <td>${fmtDate(r.date)}</td>
      <td><span class="branch-pill">${BRANCHES[r.branch] ? BRANCHES[r.branch].short : r.branch}</span></td>
      <td>${escapeHtml(r.name)}</td>
      <td>${escapeHtml(r.mobile)}</td>
      <td>${escapeHtml(r.event)}</td>
      <td class="actions">${canEdit ? `<button class="icon-btn" data-del="${r.id}" aria-label="Delete record"><i class="ti ti-trash"></i></button>` : ""}</td>
    </tr>`;
  }).join("") : `<tr><td colspan="6" class="empty-row">No souls recorded yet. Add the first record below.</td></tr>`;

  app.innerHTML = `

          <h1>Kingdom Envoys Ministries Soul Winning Tracker</h1>
          <p>100 million souls by ${TARGET_YEAR} — commenced ${fmtDate(COMMENCEMENT_DATE)}</p>
        </div>
      </div>
      <div class="session">
        <span>Signed in as <strong>${session.name}</strong></span>
        <button class="btn" id="logoutBtn"><i class="ti ti-logout"></i> Sign out</button>
      </div>
    </header>

    <div class="hero">
      <p class="eyebrow">Total souls won — all branches</p>
      <div class="total-row">
        <span class="total">${fmt(total)}</span>
        <span class="target">of ${fmt(TARGET)} target by ${TARGET_YEAR}</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="meta">
        <span>${pct.toFixed(6)}% of target reached</span>
        <span>${total > 0 ? `Avg pace: ${weeklyAverage().toFixed(1)} souls / week since commencement` : `Add records to see pace`}</span>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <p class="label">HQ total</p>
        <p class="value">${fmt(branchTotal("hq"))}</p>
      </div>
      <div class="card">
        <p class="label">Kasarani total</p>
        <p class="value">${fmt(branchTotal("kasarani"))}</p>
      </div>
      <div class="card">
        <p class="label">Kakamega total</p>
        <p class="value">${fmt(branchTotal("kakamega"))}</p>
      </div>
      <div class="card">
        <p class="label">Projection</p>
        <p class="value" style="font-size:16px;">
          ${proj
            ? (proj.onTrack
                ? `<i class="ti ti-check" style="color:var(--gold-deep);"></i> On track`
                : `<i class="ti ti-alert-triangle" style="color:var(--maroon-deep);"></i> Behind pace`)
            : "Awaiting data"}
        </p>
        <p class="sub">${proj
          ? `At current pace, target reached around ${proj.targetDate.getFullYear()}`
          : "Add records to project a target year"}</p>
      </div>
    </div>

    <section>
      <h2 class="section-title"><div class="title-left"><i class="ti ti-plus"></i> Record a soul won — ${session.name}</div></h2>
      <div class="entry-card">
        <form id="entryForm" class="entry-form">
          <div class="field" style="max-width:150px;">
            <label for="entryDate">Date</label>
            <input type="date" id="entryDate" value="${today}" />
          </div>
          <div class="field">
            <label for="entryName">Name</label>
            <input type="text" id="entryName" placeholder="Full name" />
          </div>
          <div class="field">
            <label for="entryMobile">Mobile number</label>
            <input type="tel" id="entryMobile" placeholder="e.g. 0712345678" />
          </div>
          <div class="field" style="flex:2;">
            <label for="entryEvent">Event</label>
            <input type="text" id="entryEvent" placeholder="e.g. Sunday service, crusade, outreach" />
          </div>
          <button type="submit" class="btn primary"><i class="ti ti-check"></i> Save</button>
        </form>
        <div class="form-msg" id="formMsg"></div>
      </div>
    </section>

    <section>
      <h2 class="section-title"><div class="title-left"><i class="ti ti-building-church"></i> Branch totals (all-time)</div></h2>
      <div class="entry-card">
        <table class="totals-table">
          <thead><tr><th>Branch</th><th>Souls won</th><th>Share of total</th></tr></thead>
          <tbody>
            ${branchRows}
            <tr style="font-weight:bold;border-top:1px solid var(--line);">
              <td>Combined total</td><td>${fmt(total)}</td><td>100%</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <section>
      <h2 class="section-title">
        <div class="title-left"><i class="ti ti-list"></i> All records</div>
        <button class="btn" id="downloadPdf"><i class="ti ti-file-type-pdf"></i> Download PDF</button>
      </h2>
      <div class="entry-card table-scroll">
        <table>
          <thead>
            <tr><th>Date</th><th>Branch</th><th>Name</th><th>Mobile number</th><th>Event</th><th></th></tr>
          </thead>
          <tbody id="recordsBody">${tableRows}</tbody>
        </table>
      </div>
    </section>

    <footer class="note">
      Kingdom Envoys Ministries — HQ · Kasarani · Kakamega &nbsp;·&nbsp; Target: 100,000,000 souls by ${TARGET_YEAR} &nbsp;·&nbsp; Commenced ${fmtDate(COMMENCEMENT_DATE)}
    </footer>
  `;

  document.getElementById("logoutBtn").addEventListener("click", ()=>{
    session = null;
    renderLogin();
  });

  document.getElementById("entryForm").addEventListener("submit", async (ev)=>{
    ev.preventDefault();
    const date = document.getElementById("entryDate").value;
    const name = document.getElementById("entryName").value.trim();
    const mobile = document.getElementById("entryMobile").value.trim();
    const event = document.getElementById("entryEvent").value.trim();
    const msg = document.getElementById("formMsg");
    if (!date || !name || !mobile || !event){
      msg.textContent = "Please fill in date, name, mobile number and event.";
      msg.style.color = "#a33";
      return;
    }
    records.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      branch: session.key,
      date,
      name,
      mobile,
      event
    });
    await saveRecords();
    msg.textContent = "Record saved.";
    msg.style.color = "var(--maroon-deep)";
    renderDashboard();
  });

  document.querySelectorAll("[data-del]").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const id = btn.getAttribute("data-del");
      records = records.filter(r=>r.id !== id);
      await saveRecords();
      renderDashboard();
    });
  });

  document.getElementById("downloadPdf").addEventListener("click", downloadPdf);
}

function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function downloadPdf(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const pageWidth = doc.internal.pageSize.getWidth();
  const margin = 14;
  let y = 18;

  doc.setFont("times", "bold");
  doc.setFontSize(16);
  doc.setTextColor(89, 17, 24); // maroon
  doc.text("Kingdom Envoys Ministries — Soul Winning Tracker", margin, y);
  y += 7;

  doc.setFontSize(10);
  doc.setFont("helvetica", "normal");
  doc.setTextColor(100, 90, 85);
  doc.text(`Target: 100,000,000 souls by ${TARGET_YEAR}   |   Commenced: ${fmtDate(COMMENCEMENT_DATE)}   |   Generated: ${fmtDate(new Date())}`, margin, y);
  y += 5;
  doc.text(`Total souls recorded: ${fmt(totalSouls())}`, margin, y);
  y += 8;

  // branch totals
  doc.setFont("helvetica", "bold");
  doc.setTextColor(36, 19, 19);
  doc.setFontSize(11);
  doc.text("Branch totals", margin, y);
  y += 6;
  doc.setFont("helvetica", "normal");
  doc.setFontSize(10);
  Object.keys(BRANCHES).forEach(key=>{
    doc.text(`${BRANCHES[key].name}: ${fmt(branchTotal(key))}`, margin, y);
    y += 5;
  });
  y += 4;

  // table header
  const sorted = [...records].sort((a,b)=> new Date(a.date) - new Date(b.date));
  const colX = { date: margin, branch: margin+24, name: margin+50, mobile: margin+95, event: margin+135 };

  function drawHeader(){
    doc.setFillColor(122, 31, 43); // maroon
    doc.rect(margin, y, pageWidth - margin*2, 7, "F");
    doc.setTextColor(255,255,255);
    doc.setFont("helvetica","bold");
    doc.setFontSize(9);
    doc.text("Date", colX.date+1, y+5);
    doc.text("Branch", colX.branch+1, y+5);
    doc.text("Name", colX.name+1, y+5);
    doc.text("Mobile", colX.mobile+1, y+5);
    doc.text("Event", colX.event+1, y+5);
    y += 7;
  }

  drawHeader();
  doc.setFont("helvetica","normal");
  doc.setFontSize(9);
  doc.setTextColor(36,19,19);

  sorted.forEach((r, idx)=>{
    if (y > 280){
      doc.addPage();
      y = 18;
      drawHeader();
      doc.setFont("helvetica","normal");
      doc.setFontSize(9);
      doc.setTextColor(36,19,19);
    }
    if (idx % 2 === 0){
      doc.setFillColor(247, 241, 234);
      doc.rect(margin, y, pageWidth - margin*2, 6, "F");
    }
    doc.text(fmtDate(r.date), colX.date+1, y+4.2);
    doc.text(BRANCHES[r.branch] ? BRANCHES[r.branch].short : r.branch, colX.branch+1, y+4.2);
    doc.text(truncate(r.name, 22), colX.name+1, y+4.2);
    doc.text(truncate(r.mobile, 18), colX.mobile+1, y+4.2);
    doc.text(truncate(r.event, 25), colX.event+1, y+4.2);
    y += 6;
  });

  if (sorted.length === 0){
    doc.text("No records yet.", margin+1, y+4);
  }

  doc.save(`Kingdom-Envoys-Soul-Records-${new Date().toISOString().slice(0,10)}.pdf`);
}

function truncate(str, len){
  if (!str) return "";
  return str.length > len ? str.slice(0, len-1) + "…" : str;
}

/* INIT */
renderLogin();
</script>
</body>
</html>
